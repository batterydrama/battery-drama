name: Build Mac Versions

on:
  workflow_dispatch:

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
            artifact_name: battery-drama-mac-intel
          - runner: macos-latest
            arch: arm64
            artifact_name: battery-drama-mac-apple-silicon

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Mac distributable
        run: npm run make -- --platform=darwin --arch=${{ matrix.arch }}

      - name: Upload Mac build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/make/**/*.zip