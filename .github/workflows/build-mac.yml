name: Build Mac Beta

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Mac distributable
        run: npm run make

      - name: Upload Mac build artifact
        uses: actions/upload-artifact@v4
        with:
          name: battery-drama-mac
          path: out/make/**/*.zip